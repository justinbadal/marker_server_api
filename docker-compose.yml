services:
  marker-api:
    image: ghcr.io/justinbadal/marker_server_api:latest
    build: .
    container_name: marker-api
    restart: unless-stopped
    ports:
      - "${MARKER_API_PORT:-8336}:8336"
    volumes:
      - ${HOST_OUTPUT_DIR:-C:/coding/marker_output}:/app/output
      - ${HOST_MODEL_CACHE_DIR:-C:/Users/Justin/.cache}:/root/.cache
      - ${SYNOLOGY_SSH_KEY_SOURCE:-C:/coding/marker_server_api_synology_key}:/run/secrets/marker_server_api_synology_key:ro
      - ${SYNOLOGY_SSH_KNOWN_HOSTS_SOURCE:-C:/coding/marker_server_api_synology_known_hosts}:/run/secrets/marker_server_api_synology_known_hosts:ro
    environment:
      - MARKER_OUTPUT_DIR=/app/output
      - HF_HOME=/root/.cache
      - HF_HUB_DISABLE_SYMLINKS=1
      - HF_HUB_CACHE=/root/.cache/hub
      - TRANSFORMERS_CACHE=/root/.cache/hub
    env_file:
      - .env
    # REQUIRED on Windows/WSL2 or Linux for GPU passthrough:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  marker-webui:
    image: ghcr.io/justinbadal/marker_webui:latest
    build:
      context: ./webui
      args:
        NEXT_PUBLIC_MARKER_API_BASE_URL: /api
    container_name: marker-webui
    restart: unless-stopped
    ports:
      - "${MARKER_WEBUI_PORT:-3005}:3000"
    depends_on:
      - marker-api
    env_file:
      - .env

  marker-mcp:
    image: ghcr.io/justinbadal/marker_mcp:latest
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: marker-mcp
    restart: unless-stopped
    ports:
      - "${MARKER_MCP_BIND_HOST:-10.0.1.18}:${MARKER_MCP_PORT:-8337}:8337"
    depends_on:
      - marker-api
    environment:
      - MARKER_API_BASE_URL=http://marker-api:8336
      - MARKER_MCP_HOST=0.0.0.0
      - MARKER_MCP_PORT=8337
      - MARKER_MCP_PATH=${MARKER_MCP_PATH:-/mcp}
    env_file:
      - .env

  marker-proxy:
    image: caddy:2
    container_name: marker-proxy
    restart: unless-stopped
    ports:
      - "${MARKER_PROXY_PORT:-8048}:80"
    depends_on:
      - marker-api
      - marker-webui
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  # Watchtower automatically updates your running containers
  # whenever a new image is pushed to the GitHub Container Registry.
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Check for new images every 5 minutes (300 seconds)
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      # Force modern API version for Docker Desktop 26+ compatibility
      - DOCKER_API_VERSION=1.44
    # Ensure it only watches the marker-api, marker-webui, marker-mcp, marker-proxy and itself
    command: marker-api marker-webui marker-mcp marker-proxy watchtower
