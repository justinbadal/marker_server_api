services:
  marker-api:
    image: ghcr.io/justinbadal/marker_server_api:latest
    build: .
    container_name: marker-api
    restart: unless-stopped
    ports:
      - "${MARKER_API_PORT:-8335}:8335"
    volumes:
      - ${HOST_OUTPUT_DIR:-C:/coding/marker_output}:/app/output
      - ${HOST_MODEL_CACHE_DIR:-C:/coding/marker_models}:/root/.cache/huggingface
    environment:
      - MARKER_OUTPUT_DIR=/app/output
      - HF_HOME=/root/.cache/huggingface
    env_file:
      - .env
    # REQUIRED on Windows/WSL2 or Linux for GPU passthrough:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  marker-webui:
    image: ghcr.io/justinbadal/marker_webui:latest
    build: ./webui
    container_name: marker-webui
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - marker-api
    env_file:
      - .env

  # Watchtower automatically updates your running containers
  # whenever a new image is pushed to the GitHub Container Registry.
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Check for new images every 5 minutes (300 seconds)
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      # Force modern API version for Docker Desktop 26+ compatibility
      - DOCKER_API_VERSION=1.44
    # Ensure it only watches the marker-api, marker-webui and itself
    command: marker-api marker-webui watchtower
